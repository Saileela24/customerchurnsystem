
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#e7e1ed,#bfd4f8);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:0;
        }

        .login-container{
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0px 8px 20px rgba(0,0,0,0.2);
            width:350px;
            text-align:center;
        }

        h2{
            margin-bottom:25px;
            color:#333;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:15px;
        }

        button{
            width:100%;
            background:#c5cedd;
            color:white;
            border:none;
            padding:12px;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1b5edb;
        }

        .footer{
            margin-top:15px;
            font-size:14px;
            color:#666;
        }
    </style>

</head>

<body>

<div class="login-container">

<h2>Login</h2>

<form method="POST" action="/login">

    <input type="text" name="username" placeholder="Enter Username" required>

    <input type="password" name="password" placeholder="Enter Password" required>

    <button type="submit">Login</button>

</form>


</div>

</body>
</html>
